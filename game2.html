<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRS Dress Up - Uniform 4B Perempuan</title>
    <link rel="stylesheet" href="game2.css">
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>

    <div id="game-screen" class="screen">
        <div id="instruction-pill"><span id="target-item">Tudung Hijau</span></div>

        <div id="main-layout">
            <div id="character-card">
                <div id="character-drop-zone">
                    <img src="bajuGame1/baseModelP.png" id="main-character">
                </div>
                <div class="label-baju">Uniform 4B Perempuam</div>
            </div>

            <div id="wardrobe-card">
                <h2 class="section-title">KOMPONEN BAJU</h2>
                
                <div class="items-grid">
                    <img src="bajuGame1/tudung.png" id="item-tudung" class="draggable" draggable="true" title="Tudung">
                    <img src="bajuGame1/beret.png" id="item-beret" class="draggable" draggable="true" title="Beret">
                    <img src="bajuGame1/baju.png" id="item-tshirt" class="draggable" draggable="true" title="T-Shirt">
                    <img src="bajuGame1/seluar.png" id="item-pants" class="draggable" draggable="true" title="Seluar">
                    <img src="bajuGame1/belt.png" id="item-belt" class="draggable" draggable="true" title="Tali Pinggang">
                    <img src="bajuGame1/boots.png" id="item-boots" class="draggable" draggable="true" title="Kasut But">
                </div>

                <a href="scenarioDuaEnding.html"><button id="btn-seterusnya" class="nav-button locked">SETERUSNYA</button></a>
            </div>
        </div>
    </div>

    <script src="game2.js"></script>
</body>
</html>
